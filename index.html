<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="えいごクイズ">
<meta name="theme-color" content="#ff8a5b">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>えいご 30もんクイズ</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent;
      user-select:none; -webkit-user-select:none; }
  html,body { height:100%; font-family:'Hiragino Maru Gothic ProN','Hiragino Sans',sans-serif;
    background:linear-gradient(160deg,#fff7ef,#ffe9d6); overflow:hidden; }
  .screen { position:fixed; inset:0; display:flex; flex-direction:column; }
  .hidden { display:none !important; }

  /* ホーム */
  #home { background:linear-gradient(160deg,#fff7ef,#ffe9d6); }
  .ver { position:fixed; top:8px; right:12px; font-size:12px; color:#c9a97e; font-weight:800; }
  .home-head { padding:24px 20px 8px; text-align:center; }
  .home-head .bear { font-size:64px; }
  .home-head h1 { font-size:26px; color:#e8743b; margin-top:2px; }
  .home-head p { font-size:13px; color:#a07b3a; margin-top:4px; }
  .list { flex:1; overflow-y:auto; padding:8px 16px 24px; -webkit-overflow-scrolling:touch; }
  .day { display:flex; align-items:center; gap:12px; background:#fff; border:3px solid #ffe2c2;
    border-radius:18px; padding:14px 16px; margin:10px 0; box-shadow:0 4px 0 #ffe2c277; cursor:pointer; }
  .day:active { transform:scale(.98); }
  .day.today { border-color:#ffb347; background:linear-gradient(135deg,#fff3d6,#ffe0c0); }
  .day .icon { font-size:32px; }
  .day .meta { flex:1; }
  .day .meta .t { font-size:19px; font-weight:900; color:#c4622a; }
  .day .meta .s { font-size:12px; color:#9a7b54; }
  .day .lv { font-size:11px; font-weight:800; color:#fff; background:#ffb37a; padding:2px 8px; border-radius:10px; margin-left:6px; }
  .day .go { font-size:15px; font-weight:900; color:#fff; background:linear-gradient(135deg,#ffb347,#ff7b54);
    padding:8px 14px; border-radius:22px; }
  .day .done { font-size:24px; }

  /* クイズ */
  .top { padding:12px 16px 6px; display:flex; align-items:center; gap:12px; }
  .homebtn { flex:none; width:46px; height:46px; border-radius:50%; background:#fff; border:3px solid #ffd6a5;
    display:flex; align-items:center; justify-content:center; font-size:24px; cursor:pointer; box-shadow:0 3px 0 #ffd6a577; }
  .homebtn:active { transform:scale(.92); }
  .progress { flex:1; }
  .bar { height:16px; background:#ffe2c2; border-radius:20px; overflow:hidden; }
  .bar > i { display:block; height:100%; width:0; border-radius:20px; background:linear-gradient(90deg,#ffb347,#ff8a5b); transition:width .4s; }
  .count { font-size:13px; color:#c4622a; font-weight:800; margin-top:4px; text-align:center; }

  .stage { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:8px 16px; }
  .prompt { text-align:center; margin-bottom:14px; min-height:120px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .prompt .word { font-size:60px; font-weight:900; color:#2b8a5b; line-height:1.05; }
  .prompt .pic { font-size:96px; line-height:1; }
  .prompt .picword { font-size:30px; font-weight:800; color:#2b8a5b; margin-top:2px; }
  .prompt .emojis { font-size:46px; line-height:1.15; max-width:560px; }
  .prompt .math { font-size:56px; font-weight:900; color:#2b8a5b; }
  .prompt .math .dots { font-size:30px; display:block; color:#5a86c9; margin-bottom:4px; }
  .hint { font-size:16px; color:#b5794a; margin-top:6px; font-weight:700; }
  .sound { margin-top:8px; display:inline-flex; align-items:center; gap:8px; background:#fff; border:2px solid #ffd6a5;
    color:#c4622a; font-weight:800; padding:7px 16px; border-radius:30px; font-size:16px; cursor:pointer; }
  .sound:active { transform:scale(.94); }

  .cards { display:flex; flex-wrap:wrap; justify-content:center; gap:14px; width:100%; max-width:640px; }
  .card { aspect-ratio:1/1; border-radius:26px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    cursor:pointer; position:relative; background:#fff; box-shadow:0 9px 0 rgba(0,0,0,.10); border:6px solid #fff;
    transition:transform .12s; touch-action:manipulation; }
  .cards[data-count="2"] .card { flex:1 1 40%; }
  .cards[data-count="3"] .card { flex:1 1 27%; }
  .card:active { transform:scale(.96); }
  .card > * { pointer-events:none; }
  .card .face { font-size:84px; line-height:1; }
  .cards[data-count="3"] .card .face { font-size:60px; }
  .card .swatch { width:62%; height:52%; border-radius:18px; border:4px solid rgba(0,0,0,.08); }
  .card .big { font-size:80px; font-weight:900; color:#e8743b; }
  .cards[data-count="3"] .card .big { font-size:60px; }
  .card .txt { font-size:34px; font-weight:900; color:#2b8a5b; }
  .cards[data-count="3"] .card .txt { font-size:26px; }
  .card .label { margin-top:8px; font-size:24px; font-weight:900; color:#3a3a3a; background:#ffffffcc; padding:1px 12px; border-radius:12px; }
  .cards[data-count="3"] .card .label { font-size:18px; }
  .card.wrong { animation:shake .4s; }
  .card.right { animation:pop .5s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 50%{transform:translateX(10px)} 75%{transform:translateX(-6px)} }
  @keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.12)} 100%{transform:scale(1)} }

  .overlay { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; background:rgba(255,247,239,.96); z-index:30; text-align:center; padding:24px; }
  .big-emoji { font-size:110px; animation:bounce .6s infinite alternate; }
  @keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-16px)} }
  .overlay h1 { font-size:36px; color:#e8743b; }
  .overlay p { font-size:19px; color:#7a5a3a; }
  .btn { font-size:23px; font-weight:900; color:#fff; background:linear-gradient(135deg,#ffb347,#ff7b54); border:none;
    padding:15px 38px; border-radius:40px; box-shadow:0 8px 0 #e0663d; cursor:pointer; }
  .btn:active { transform:translateY(4px); box-shadow:0 4px 0 #e0663d; }
  .btn2 { background:#fff; color:#c4622a; border:3px solid #ffd6a5; box-shadow:0 6px 0 #ffd6a577; font-size:19px; padding:11px 28px; }

  .praise { position:fixed; inset:0; pointer-events:none; z-index:40; }
  .spark { position:absolute; animation:fall 1.1s ease-in forwards; }
  @keyframes fall { 0%{transform:translateY(-40px) rotate(0); opacity:1} 100%{transform:translateY(90vh) rotate(360deg); opacity:0} }
  .flash { position:fixed; inset:0; background:radial-gradient(circle,#fff59d55,transparent 60%); z-index:35; pointer-events:none; opacity:0; }
  .flash.on { animation:flash .5s; }
  @keyframes flash { 0%{opacity:0} 30%{opacity:1} 100%{opacity:0} }
</style>
</head>
<body>

<div class="screen" id="home">
  <div class="ver">ver.9</div>
  <div class="home-head">
    <div class="bear">🐻</div>
    <h1>えいご 30もんクイズ</h1>
    <p>ひづけを えらんで はじめよう！ まいにち レベルアップ📈</p>
  </div>
  <div class="list" id="dayList"></div>
</div>

<div class="screen hidden" id="quiz">
  <div class="top">
    <div class="homebtn" id="homeBtn">🏠</div>
    <div class="progress">
      <div class="bar"><i id="barfill"></i></div>
      <div class="count" id="count"></div>
    </div>
  </div>
  <div class="stage">
    <div class="prompt" id="prompt"></div>
    <div class="sound" id="sound">🔊 もういちど きく</div>
    <div class="cards" id="cards"></div>
  </div>
</div>

<div class="flash" id="flash"></div>
<div class="praise" id="praise"></div>

<div class="overlay hidden" id="doneScreen">
  <div class="big-emoji">🎉</div>
  <h1>ぜんぶ できたね！</h1>
  <p id="doneMsg"></p>
  <button class="btn" id="againBtn">もういちど あそぶ</button>
  <button class="btn btn2" id="doneHomeBtn">🏠 ホームへ</button>
</div>

<script>
/* ============================================================
   語彙データ（カテゴリごと）: [英語, よみ, 日本語, 絵文字]
   ============================================================ */
const V = {
  color:[['red','レッド','あか','#e53935'],['blue','ブルー','あお','#1e88e5'],['yellow','イエロー','きいろ','#fdd835'],
    ['green','グリーン','みどり','#43a047'],['pink','ピンク','ピンク','#ec407a'],['orange','オレンジ','オレンジ','#fb8c00'],
    ['purple','パープル','むらさき','#8e24aa'],['black','ブラック','くろ','#212121'],['white','ホワイト','しろ','#fafafa'],
    ['brown','ブラウン','ちゃいろ','#6d4c41']],
  animal:[['dog','ドッグ','いぬ','🐶'],['cat','キャット','ねこ','🐱'],['bird','バード','とり','🐦'],['fish','フィッシュ','さかな','🐟'],
    ['duck','ダック','あひる','🦆'],['frog','フロッグ','かえる','🐸'],['lion','ライオン','ライオン','🦁'],['elephant','エレファント','ぞう','🐘'],
    ['monkey','モンキー','さる','🐵'],['pig','ピッグ','ぶた','🐷'],['cow','カウ','うし','🐮'],['rabbit','ラビット','うさぎ','🐰'],
    ['bear','ベア','くま','🐻'],['sheep','シープ','ひつじ','🐑'],['tiger','タイガー','とら','🐯'],['horse','ホース','うま','🐴'],
    ['mouse','マウス','ねずみ','🐭'],['penguin','ペンギン','ペンギン','🐧'],['owl','アウル','ふくろう','🦉'],['bee','ビー','はち','🐝'],
    ['turtle','タートル','かめ','🐢'],['snake','スネイク','へび','🐍'],['giraffe','ジラフ','きりん','🦒'],['fox','フォックス','きつね','🦊']],
  food:[['apple','アップル','りんご','🍎'],['banana','バナナ','バナナ','🍌'],['grapes','グレープ','ぶどう','🍇'],['strawberry','ストロベリー','いちご','🍓'],
    ['orange','オレンジ','みかん','🍊'],['milk','ミルク','ミルク','🥛'],['bread','ブレッド','パン','🍞'],['egg','エッグ','たまご','🥚'],
    ['watermelon','ウォーターメロン','すいか','🍉'],['cherry','チェリー','さくらんぼ','🍒'],['carrot','キャロット','にんじん','🥕'],['tomato','トマト','トマト','🍅'],
    ['corn','コーン','とうもろこし','🌽'],['rice','ライス','ごはん','🍚'],['cake','ケーキ','ケーキ','🍰'],['ice cream','アイスクリーム','アイス','🍦']],
  vehicle:[['bus','バス','バス','🚌'],['train','トレイン','でんしゃ','🚃'],['airplane','エアプレイン','ひこうき','✈️'],['car','カー','くるま','🚗'],
    ['boat','ボート','ふね','⛵'],['bicycle','バイスィクル','じてんしゃ','🚲'],['truck','トラック','トラック','🚚'],['rocket','ロケット','ロケット','🚀'],
    ['helicopter','ヘリコプター','ヘリコプター','🚁']],
  shape:[['circle','サークル','まる','⭕'],['star','スター','ほし','⭐'],['heart','ハート','ハート','❤️'],['square','スクエア','しかく','🟦'],
    ['triangle','トライアングル','さんかく','🔺'],['diamond','ダイヤモンド','ひしがた','🔷']],
  body:[['hand','ハンド','て','✋'],['eye','アイ','め','👁️'],['ear','イヤー','みみ','👂'],['nose','ノーズ','はな','👃'],
    ['mouth','マウス','くち','👄'],['foot','フット','あし','🦶']],
  nature:[['sun','サン','たいよう','☀️'],['moon','ムーン','つき','🌙'],['star','スター','ほし','⭐'],['rain','レイン','あめ','🌧️'],
    ['cloud','クラウド','くも','☁️'],['snow','スノー','ゆき','❄️'],['tree','ツリー','き','🌳'],['flower','フラワー','はな','🌸'],['rainbow','レインボー','にじ','🌈']],
  clothes:[['hat','ハット','ぼうし','🧢'],['shirt','シャツ','シャツ','👕'],['shoes','シューズ','くつ','👟'],['socks','ソックス','くつした','🧦'],
    ['dress','ドレス','ワンピース','👗'],['pants','パンツ','ズボン','👖'],['gloves','グローブ','てぶくろ','🧤']],
  feeling:[['happy','ハッピー','うれしい','😊'],['sad','サッド','かなしい','😢'],['angry','アングリー','おこる','😠'],['sleepy','スリーピー','ねむい','😴'],
    ['hungry','ハングリー','おなかすいた','🤤'],['surprised','サプライズド','びっくり','😲']],
  weather:[['sunny','サニー','はれ','☀️'],['rainy','レイニー','あめ','🌧️'],['windy','ウィンディ','かぜ','💨'],['snowy','スノーウィ','ゆき','⛄']],
};
const NUMW=['zero','one','two','three','four','five','six','seven','eight','nine','ten',
  'eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen','twenty'];
const COUNT_OBJ=['🍎','⭐','🐶','🍓','🚗','🌸','🐟','🎈','🍌','🐱','🧸','⚽'];
const CVC=[['cat','🐱'],['dog','🐶'],['pig','🐷'],['cow','🐮'],['bus','🚌'],['sun','☀️'],['bed','🛏️'],['cup','☕'],
  ['box','📦'],['fox','🦊'],['egg','🥚'],['pen','🖊️'],['bag','👜'],['hat','🎩'],['bee','🐝'],['car','🚗']];

/* ============================================================
   ユーティリティ
   ============================================================ */
/* 乱数はRNG経由。プール生成中は固定シード=毎回同じプール（日付→問題を固定） */
let RNG=Math.random;
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function rnd(n){ return Math.floor(RNG()*n); }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=rnd(i+1);[a[i],a[j]]=[a[j],a[i]];} return a; }
function sample(arr,not){ let x; do{ x=arr[rnd(arr.length)]; }while(not&&x===not); return x; }
const el=id=>document.getElementById(id);

/* カード生成ヘルパー */
function cColor(w){ return {kind:'color', v:w[3], label:w[2]}; }
function cEmoji(w){ return {kind:'emoji', v:w[3], label:w[2]}; }
function cNum(n){ return {kind:'big', v:String(n)}; }
function cLetter(ch){ return {kind:'big', v:ch}; }
function cText(t){ return {kind:'txt', v:t}; }

/* 問題生成: 語彙 英単語→絵/色（レベル1系） */
function qWordToPic(cat){
  const list=V[cat]; const w=sample(list); const d=sample(list,w);
  const mk = cat==='color'?cColor:cEmoji;
  const correct=mk(w); correct.correct=true;
  return {level:1, prompt:{kind:'word', text:w[0], audio:{text:w[0]}}, hint:'えいごを きいて えらぼう',
          options:[correct, mk(d)]};
}
/* 語彙 絵→英単語を読む（レベル2系・読みの導入）。nWrong=誤答数, lv=レベル */
function qPicToWord(cat, nWrong, lv){
  nWrong=nWrong||1; lv=lv||2;
  const list=V[cat]; const w=sample(list);
  const correct=cText(w[0]); correct.correct=true;
  const opts=[correct]; const used=[w];
  for(let i=0;i<nWrong;i++){ let d; do{ d=sample(list); }while(used.includes(d)); used.push(d); opts.push(cText(d[0])); }
  return {level:lv, prompt:{kind:'pic', emoji:w[3], audio:{text:w[0]}}, hint:'あってる えいごは どれ？', options:opts};
}
/* 数える */
function qCount(){
  const n=1+rnd(10); const o=sample(COUNT_OBJ);
  const correct=cNum(n); correct.correct=true;
  let w; do{ w=1+rnd(10);}while(w===n);
  return {level:2, prompt:{kind:'emojis', emojis:o.repeat(n), audio:{text:'How many?'}}, hint:'いくつ かな？',
          options:[correct, cNum(w)]};
}
/* 最初の音（フォニックス） */
function qPhonics(){
  const cats=['animal','food','vehicle']; const w=sample(V[sample(cats)]);
  const first=w[0][0].toUpperCase();
  let dl; do{ dl=String.fromCharCode(65+rnd(26)); }while(dl===first);
  const correct=cLetter(first); correct.correct=true;
  return {level:2, prompt:{kind:'pic', emoji:w[3], word:w[0], audio:{text:w[0]+', starts with'}},
          hint:'さいしょの おとは？', options:[correct, cLetter(dl)]};
}
/* たし算（レベル3・3択） */
function qAdd(max){
  let a,b; do{ a=1+rnd(max-1); b=1+rnd(max-1);}while(a+b>max);
  const s=a+b; const correct=cNum(s); correct.correct=true;
  const w1=cNum(s+1); const w2=cNum(Math.max(0,s-1));
  return {level:3, prompt:{kind:'math', a,b,op:'+', audio:{text:`${NUMW[a]} plus ${NUMW[b]}`}}, hint:'たしざん！',
          options:[correct, w1, w2]};
}
/* ひき算（レベル4・3択） */
function qSub(max){
  const a=2+rnd(max-1); const b=1+rnd(a-1); const s=a-b;
  const correct=cNum(s); correct.correct=true;
  let w1=s+1, w2=Math.max(0,s-1); if(w2===s)w2=s+2;
  return {level:4, prompt:{kind:'math', a,b,op:'−', audio:{text:`${NUMW[a]} minus ${NUMW[b]}`}}, hint:'ひきざん！',
          options:[correct, cNum(w1), cNum(w2)]};
}
/* 大文字→小文字（レベル3） */
function qUpperLower(){
  const i=rnd(26); const up=String.fromCharCode(65+i); const lo=String.fromCharCode(97+i);
  let dj; do{ dj=rnd(26);}while(dj===i);
  const correct=cText(lo); correct.correct=true;
  return {level:3, prompt:{kind:'word', text:up, audio:{text:up}}, hint:'おなじ ちいさい もじは？',
          options:[correct, cText(String.fromCharCode(97+dj))]};
}
/* たんごを よむ CVC（レベル3・絵をえらぶ） */
function qCVC(){
  const w=sample(CVC); let d; do{ d=sample(CVC);}while(d===w);
  const correct=cEmoji([,,'',w[1]]); correct.correct=true;
  return {level:3, prompt:{kind:'word', text:w[0], audio:{text:w[0]}}, hint:'よんで えを えらぼう',
          options:[correct, cEmoji([,,'',d[1]])]};
}
/* 数(11-20)を読む（レベル3） */
function qBigNum(){
  const n=11+rnd(10); const correct=cNum(n); correct.correct=true;
  let w; do{ w=11+rnd(10);}while(w===n);
  return {level:3, prompt:{kind:'word', text:NUMW[n], audio:{text:NUMW[n]}}, hint:'すうじは どれ？',
          options:[correct, cNum(w)]};
}
/* かけ算（レベル5・3択） */
function qMul(max){
  const a=1+rnd(max), b=1+rnd(max); const s=a*b;
  const correct=cNum(s); correct.correct=true;
  const cands=new Set(); while(cands.size<2){ const dd=s+(rnd(2)?1:-1)*(1+rnd(3)); if(dd>=0&&dd!==s)cands.add(dd); }
  const opts=[correct]; cands.forEach(c=>opts.push(cNum(c)));
  return {level:5, prompt:{kind:'math', a,b,op:'×', audio:{text:`${NUMW[a]} times ${NUMW[b]}`}}, hint:'かけざん！', options:opts};
}

/* ============================================================
   出題プールを組み立てる（レベル順・日替わりで重複しないよう順番に消費）
   各レベル内はシャッフルして日ごとに変化をつける
   ============================================================ */
function uniq(gen, n, keyf){
  const out=[], seen=new Set(); let guard=0;
  while(out.length<n && guard++<n*40){ const q=gen(); const k=keyf(q); if(!seen.has(k)){seen.add(k); out.push(q);} }
  return out;
}
function buildPool(){
  RNG=mulberry32(20260719);   // 固定シード: いつ開いても同じプール
  let L1=[], L2=[], L3=[], L4=[], L5=[];
  // レベル1: 基本語彙（英単語→絵/色）両方向で厚く
  ['color','animal','food','vehicle','shape','body'].forEach(c=>{
    V[c].forEach(w=>{ const d=sample(V[c],w); const mk=c==='color'?cColor:cEmoji;
      const correct=mk(w); correct.correct=true;
      L1.push({level:1, prompt:{kind:'word',text:w[0],audio:{text:w[0]}}, hint:'えいごを きいて えらぼう', options:[correct, mk(d)]}); });
  });
  // レベル2: 数える・フォニックス・読み導入・追加語彙
  L2=L2.concat(uniq(qCount,110,q=>'c'+q.prompt.emojis));
  L2=L2.concat(uniq(qPhonics,60,q=>'p'+q.prompt.emoji+q.options[0].v));
  ['nature','clothes','feeling','weather'].forEach(c=>{
    V[c].forEach(w=>{ const d=sample(V[c],w);
      const correct=cEmoji(w); correct.correct=true;
      L2.push({level:2, prompt:{kind:'word',text:w[0],audio:{text:w[0]}}, hint:'えいごを きいて えらぼう', options:[correct, cEmoji(d)]}); });
  });
  ['animal','food','vehicle'].forEach(c=> L2=L2.concat(uniq(()=>qPicToWord(c,1,2),12,q=>'w'+q.prompt.emoji)) );
  // レベル3: たし算(〜10)・大小文字・CVC・11-20
  L3=L3.concat(uniq(()=>qAdd(10),45,q=>`a${q.prompt.a}+${q.prompt.b}`));
  L3=L3.concat(uniq(qUpperLower,26,q=>'u'+q.prompt.text));
  L3=L3.concat(uniq(qCVC,16,q=>'v'+q.prompt.text));
  L3=L3.concat(uniq(qBigNum,10,q=>'n'+q.prompt.text));
  // レベル4: ひき算(〜10)・たし算(〜20)・読み(絵→単語 3択)
  L4=L4.concat(uniq(()=>qSub(10),45,q=>`s${q.prompt.a}-${q.prompt.b}`));
  L4=L4.concat(uniq(()=>qAdd(20),120,q=>`A${q.prompt.a}+${q.prompt.b}`));
  ['animal','food','nature','clothes'].forEach(c=> L4=L4.concat(uniq(()=>qPicToWord(c,2,4),12,q=>'W'+q.prompt.emoji)) );
  // レベル5: かけ算・ひき算(〜20)・読み(3択・むずかしめ)
  L5=L5.concat(uniq(()=>qMul(5),25,q=>`m${q.prompt.a}x${q.prompt.b}`));
  L5=L5.concat(uniq(()=>qMul(9),60,q=>`M${q.prompt.a}x${q.prompt.b}`));
  L5=L5.concat(uniq(()=>qSub(20),120,q=>`S${q.prompt.a}-${q.prompt.b}`));
  const pool=[].concat(shuffle(L1), shuffle(L2), shuffle(L3), shuffle(L4), shuffle(L5));
  RNG=Math.random;            // ゲーム中の表示順などは通常のランダムに戻す
  return pool;
}
const POOL=buildPool();
const DAILY=30;

/* ============================================================
   日付 → その日の30問（順番に消費＝連続する日は重複しない）
   ============================================================ */
const START=new Date(2026,6,19); START.setHours(0,0,0,0);   // 6=July（0始まり）
function dayIndexFor(d){ return Math.max(0, Math.round((d-START)/86400000)); }
function levelOfIndex(idx){
  const pos=(idx*DAILY)%POOL.length; const q=POOL[pos]; return q?q.level:1;
}
function daySlice(d){
  const idx=dayIndexFor(d); const s=(idx*DAILY)%POOL.length; const out=[];
  for(let i=0;i<DAILY;i++) out.push(POOL[(s+i)%POOL.length]);
  return out;
}
function dateKey(d){ return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; }
function isDone(d){ return localStorage.getItem('eq_done_'+dateKey(d))==='1'; }
function markDone(d){ localStorage.setItem('eq_done_'+dateKey(d),'1'); }
const LVNAME=['','レベル1','レベル2','レベル3','レベル4','レベル5'];

/* ============================================================
   ホーム画面
   ============================================================ */
function renderHome(){
  const list=el('dayList'); list.innerHTML='';
  const today=new Date(); today.setHours(0,0,0,0);
  // 開始日(=今日)より前の日付は内容が無いので出さない。今日以降だけ、日が経つほど増える
  const back=Math.min(60, dayIndexFor(today));
  for(let i=0;i<=back;i++){
    const d=new Date(today); d.setDate(today.getDate()-i);
    const done=isDone(d); const lv=levelOfIndex(dayIndexFor(d));
    const label=i===0?'きょう':i===1?'きのう':`${d.getMonth()+1}/${d.getDate()}`;
    const sub=`${d.getMonth()+1}/${d.getDate()} の30もん`+(done?'・クリア済':'');
    const row=document.createElement('div');
    row.className='day'+(i===0?' today':'');
    row.innerHTML=`<div class="icon">${done?'🌟':'📘'}</div>
      <div class="meta"><div class="t">${label}<span class="lv">${LVNAME[lv]}</span></div><div class="s">${sub}</div></div>
      ${done?'<div class="done">✅</div>':'<div class="go">▶ あそぶ</div>'}`;
    row.onclick=()=>startDay(d);
    list.appendChild(row);
  }
}

/* ============================================================
   音
   ============================================================ */
let AC=null, AUDIO_UNLOCKED=false;
function unlockAudio(){ try{
  if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended')AC.resume();
  // ★ iOSのWeb Audio出力ロック解除: 無音バッファを1回再生（resumeだけでは不十分な端末対策）
  const buf=AC.createBuffer(1,1,22050); const src=AC.createBufferSource();
  src.buffer=buf; src.connect(AC.destination); src.start(0);
  AUDIO_UNLOCKED=true;
}catch(e){} }
function ensureAudio(){ if(!AC)return false; if(AC.state==='suspended'){try{AC.resume();}catch(e){}} return true; }
function tone(f,t0,dur,type,g){ const o=AC.createOscillator(),ga=AC.createGain(); o.type=type; o.frequency.value=f;
  ga.gain.setValueAtTime(0,t0); ga.gain.linearRampToValueAtTime(g,t0+0.02); ga.gain.exponentialRampToValueAtTime(0.001,t0+dur);
  o.connect(ga); ga.connect(AC.destination); o.start(t0); o.stop(t0+dur); }
/* ベル（倍音つき）で「ピンポン♪」らしい明るい音を作る */
function bell(freq,t0,dur,gain){
  [1,2,3].forEach((m,i)=>{ const o=AC.createOscillator(),g=AC.createGain();
    o.type='sine'; o.frequency.value=freq*m; const gg=gain*(i===0?1:i===1?0.4:0.18);
    g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(gg,t0+0.005);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    o.connect(g); g.connect(AC.destination); o.start(t0); o.stop(t0+dur); });
}
/* 正解: ピンポン ピンポン♪（明るい2連ベル） */
function playCorrect(){ if(!ensureAudio())return; const t=AC.currentTime;
  bell(1568,t,0.22,0.32); bell(2093,t+0.14,0.30,0.32);
  bell(1568,t+0.34,0.22,0.32); bell(2093,t+0.48,0.55,0.30); }
/* 不正解: ぶっ ぶー（ブザー） */
function buzz(t0,dur){ const o=AC.createOscillator(),o2=AC.createOscillator(),g=AC.createGain();
  o.type='square'; o.frequency.value=150; o2.type='square'; o2.frequency.value=146;
  g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(0.16,t0+0.01);
  g.gain.setValueAtTime(0.16,t0+Math.max(0.02,dur-0.03)); g.gain.linearRampToValueAtTime(0,t0+dur);
  o.connect(g); o2.connect(g); g.connect(AC.destination);
  o.start(t0);o2.start(t0);o.stop(t0+dur);o2.stop(t0+dur); }
function playWrong(){ if(!ensureAudio())return; const t=AC.currentTime; buzz(t,0.15); buzz(t+0.22,0.45); }
/* 全問クリア: 明るいファンファーレ */
function playFanfare(){ if(!ensureAudio())return; const t=AC.currentTime;
  [523,659,784,1046].forEach((f,i)=>bell(f,t+i*0.11,0.35,0.3));
  bell(1568,t+0.5,0.6,0.3); bell(2093,t+0.64,0.9,0.26); }
/* 端末にある中で「一番自然な声」を選ぶ（compactの機械音を避ける） */
let VOICE_EN=null, VOICE_JA=null;
function pickVoices(){
  const vs=(speechSynthesis.getVoices&&speechSynthesis.getVoices())||[];
  const en=vs.filter(v=>/^en/i.test(v.lang));
  VOICE_EN = en.find(v=>/(enhanced|premium|siri|neural)/i.test(v.name))
          || en.find(v=>/(samantha|ava|allison|susan|karen|aaron|nicky|daniel)/i.test(v.name))
          || en.find(v=>/en-US/i.test(v.lang)) || en[0] || null;
  const ja=vs.filter(v=>/^ja/i.test(v.lang));
  VOICE_JA = ja.find(v=>/(enhanced|premium|siri|kyoko|o-ren|hattori)/i.test(v.name)) || ja[0] || null;
}
if('speechSynthesis' in window){ pickVoices(); speechSynthesis.onvoiceschanged=pickVoices; }
function speak(text,lang){ try{ speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text); const ja=(lang==='ja-JP'); u.lang=lang||'en-US';
  const v=ja?VOICE_JA:VOICE_EN; if(v) u.voice=v;
  u.rate=ja?1.0:0.85; u.pitch=1.05; speechSynthesis.speak(u);}catch(e){} }

/* ============================================================
   ゲーム
   ============================================================ */
let queue=[], solved=0, activeDate=null, locked=false;
function buildQueue(d){ queue=daySlice(d).map(q=>Object.assign({},q)); solved=0; activeDate=d; }
function showScreen(n){ el('home').classList.toggle('hidden',n!=='home'); el('quiz').classList.toggle('hidden',n!=='quiz'); }
function startDay(d){ unlockAudio(); buildQueue(d); el('doneScreen').classList.add('hidden'); showScreen('quiz'); render(); }
function goHome(){ try{speechSynthesis.cancel();}catch(e){} el('doneScreen').classList.add('hidden'); renderHome(); showScreen('home'); }
function updateBar(){ const pct=Math.round(solved/DAILY*100); el('barfill').style.width=pct+'%';
  el('count').textContent=`せいかい ${solved} / ${DAILY}　（のこり ${queue.length}）`; }

function promptHTML(p){
  if(p.kind==='word')  return `<div class="word">${p.text}</div>`;
  if(p.kind==='pic')   return `<div class="pic">${p.emoji}</div>`+(p.word?`<div class="picword">${p.word}</div>`:'');
  if(p.kind==='emojis')return `<div class="emojis">${p.emojis}</div>`;
  if(p.kind==='math'){ const dot='🔵';
    const dots=(p.op==='+'||p.op==='−')?`<span class="dots">${dot.repeat(p.a)} ${p.op} ${dot.repeat(p.b)}</span>`:'';
    return `<div class="math">${dots}${p.a} ${p.op} ${p.b} = ?</div>`; }
  return '';
}
function cardHTML(o){
  if(o.kind==='color') return `<div class="swatch" style="background:${o.v}"></div><div class="label">${o.label}</div>`;
  if(o.kind==='emoji') return `<div class="face">${o.v}</div>`+(o.label?`<div class="label">${o.label}</div>`:'');
  if(o.kind==='big')   return `<div class="big">${o.v}</div>`;
  if(o.kind==='txt')   return `<div class="txt">${o.v}</div>`;
  return '';
}
function render(){
  if(queue.length===0){ finish(); return; }
  locked=false;
  const q=queue[0];
  el('prompt').innerHTML=promptHTML(q.prompt)+(q.hint?`<div class="hint">${q.hint}</div>`:'');
  const cont=el('cards'); const opts=shuffle(q.options); cont.dataset.count=opts.length; cont.innerHTML='';
  opts.forEach(o=>{ const c=document.createElement('div'); c.className='card'; c.innerHTML=cardHTML(o);
    const h=()=>choose(!!o.correct, c); c.onclick=h; c.onpointerup=h; cont.appendChild(c); });
  updateBar();
  if(q.prompt.audio) setTimeout(()=>speak(q.prompt.audio.text, q.prompt.audio.lang),150);
}
function choose(isRight, cardEl){
  if(locked) return; locked=true;
  if(isRight){ cardEl.classList.add('right'); playCorrect(); flash(); sparkle();
    queue.shift(); solved++; setTimeout(render,1000);
  }else{ cardEl.classList.add('wrong'); playWrong();
    queue.push(queue.shift()); setTimeout(render,900);
  }
}
function flash(){ const f=el('flash'); f.classList.remove('on'); void f.offsetWidth; f.classList.add('on'); }
function sparkle(){ const box=el('praise'); const ems=['⭐','🌟','✨','🎉','💫','🌈'];
  for(let i=0;i<18;i++){ const s=document.createElement('div'); s.className='spark'; s.textContent=ems[rnd(ems.length)];
    s.style.left=Math.random()*100+'vw'; s.style.animationDelay=(Math.random()*0.3)+'s'; s.style.fontSize=(24+Math.random()*26)+'px';
    box.appendChild(s); setTimeout(()=>s.remove(),1300); } }
function finish(){ if(activeDate) markDone(activeDate);
  el('doneMsg').textContent='30もん ぜんぶ せいかい！ また あそんでね！';
  el('doneScreen').classList.remove('hidden'); playFanfare(); }

el('homeBtn').onclick=goHome;
el('doneHomeBtn').onclick=goHome;
el('againBtn').onclick=()=>{ el('doneScreen').classList.add('hidden'); buildQueue(activeDate); render(); };
el('sound').onclick=()=>{ if(queue[0]&&queue[0].prompt.audio) speak(queue[0].prompt.audio.text, queue[0].prompt.audio.lang); };
// 画面のどこを最初にさわっても音を解除（day選択前でも確実に）
['pointerdown','touchstart'].forEach(ev=>document.addEventListener(ev,()=>{ if(!AUDIO_UNLOCKED)unlockAudio(); else ensureAudio(); },{passive:true}));
renderHome();
</script>
</body>
